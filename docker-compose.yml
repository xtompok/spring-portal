services:
  db:
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Bound to localhost only — reach it from the laptop / via SSH tunnel.
      - "127.0.0.1:5466:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_DEFAULT_THEME: light
      # Datasource provisioning reads these:
      DS_DB_HOST: db:5432
      DS_DB_NAME: ${POSTGRES_DB}
      DS_DB_USER: ${POSTGRES_USER}
      DS_DB_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3002:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Ad-hoc CLI: `docker compose run --rm portal load /landing/<backup>`
  portal:
    build: .
    image: skalna-portal:latest
    environment:
      DATABASE_URL: ${DATABASE_URL}
      WEATHER_STATION: ${WEATHER_STATION}
      WEATHER_SOURCE: ${WEATHER_SOURCE}
    volumes:
      - ${LANDING_DIR:-./landing}:/landing
      - ${BACKUPS_DIR:-./backups}:/backups
    depends_on:
      db:
        condition: service_healthy
    # No long-running process; used via `run`.
    profiles: ["tools"]

  scheduler:
    build: .
    image: skalna-portal:latest
    command: ["supercronic", "/app/scheduler/crontab"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      WEATHER_STATION: ${WEATHER_STATION}
      WEATHER_SOURCE: ${WEATHER_SOURCE}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${LANDING_DIR:-./landing}:/landing
      - ${BACKUPS_DIR:-./backups}:/backups
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  grafana-data:
